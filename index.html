<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC CALCULATOR</title>
    <style>
        :root {
            --primary: #005a36;
            --secondary: #ff9f43;
            --light: #f8f9fa;
            --dark: #212529;
            --card-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            --float-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            --dayoff-bg: #e6f4ea;
            --dayoff-border: #b7e1cd;
            --dayoff-text: #137333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #eef2f3;
            color: var(--dark);
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            margin: 10px auto;
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--float-shadow);
            position: relative;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 10px;
        }
        h2 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .lang-btn {
            background: var(--light);
            color: var(--dark);
            border: 1px solid #ced4da;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 20px;
            width: auto;
            box-shadow: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        h3 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
        }
        .section {
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: #495057;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--light);
        }
        .row {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            width: 100%;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,90,54,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.98); }
        
        .days-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .day-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--dayoff-bg);
            border: 1px solid var(--dayoff-border);
            padding: 8px 2px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .day-btn .num { font-size: 18px; font-weight: 700; color: var(--dayoff-text); }
        .day-btn .month { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--dayoff-text); opacity: 0.8; margin-top: 2px; }
        
        .day-btn .tag {
            display: none;
            background-color: #137333;
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.2px;
        }
        .day-btn.past-off .tag { display: block; }

        .day-btn.active {
            background: linear-gradient(135deg, var(--secondary), #f39c12) !important;
            border-color: transparent !important;
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 159, 67, 0.4);
        }
        .day-btn.active .num, .day-btn.active .month { color: white !important; }
        .day-btn.active .tag { display: none !important; }

        .list-item {
            background: var(--light);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e9ecef;
        }
        .remove-btn { color: #dc3545; font-weight: bold; font-size: 18px; cursor: pointer; padding: 0 10px; }
        
        .result-box {
            background: linear-gradient(135deg, #e6f4ea, #d4edda);
            border-left: 6px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .result-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 6px; }
        .highlight { font-weight: 700; font-size: 18px; color: var(--primary); }

        .history-box {
            background: var(--light);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #ced4da;
        }
        .history-item {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            border: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-date { font-weight: 700; color: #495057; }
        .history-profit { font-weight: 700; color: var(--primary); }

        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-whatsapp { background-color: #25d366; box-shadow: 0 3px 6px rgba(37,211,102,0.3); }
        .btn-print { background-color: #4a5568; box-shadow: 0 3px 6px rgba(74,85,104,0.3); }
        .btn-save { background-color: #007bff; box-shadow: 0 3px 6px rgba(0,123,255,0.3); }
        .btn-email { background-color: #dc3545; box-shadow: 0 3px 6px rgba(220,53,69,0.3); }

        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            body { background: white; padding: 0; zoom: 55% !important; }
            .container { box-shadow: none; max-width: 100%; padding: 0; margin: 0; }
            .action-area, .lang-btn, .remove-btn, button[type="button"], .history-box { display: none !important; }
            input, select { background: none !important; border: 1px solid #aaa !important; }
            .day-btn { background: #e6f4ea !important; border-color: #b7e1cd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .day-btn .num, .day-btn .month { color: #137333 !important; }
            .day-btn .tag { background-color: #137333 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .day-btn.active { background: #ff9f43 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .day-btn.active .num, .day-btn.active .month { color: white !important; }
            .result-box { background: #e6f4ea !important; border-left: 6px solid #005a36 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>UC CALCULATOR</h2>
        <button class="lang-btn" onclick="toggleLanguage()">🌐 <span id="langLabel">Português 🇧🇷</span></button>
    </div>
    
    <!-- TRANSPORTE -->
    <div class="section">
        <h3 id="txtTransportTitle">Transporte (ida e volta)</h3>
        <label id="txtTransportSub">Selecione as datas em que pegou trem (£6.00 ida/volta):</label>
        <div class="days-grid" id="unifiedDaysGrid"></div>
    </div>

    <!-- RENDIMENTOS -->
    <div class="section">
        <h3 id="txtIncomeTitle">Ganhos Recebidos no Período</h3>
        <div class="row">
            <div style="flex: 2;">
                <label id="lblSource">Origem</label>
                <input type="text" id="incomeLabel" placeholder="Ex: Semana 15">
            </div>
            <div style="flex: 1;">
                <label id="lblAmount1">Valor (£)</label>
                <input type="number" id="incomeVal" step="0.01" placeholder="0.00">
            </div>
        </div>
        <button type="button" id="btnAddIncome" onclick="addIncome()">+ Adicionar Ganho</button>
        <div id="incomeList" style="margin-top: 8px;"></div>
    </div>

    <!-- DESPESAS EXTRA -->
    <div class="section">
        <h3 id="txtExpenseTitle">Outras Despesas (Telefone, etc)</h3>
        <div class="row">
            <div style="flex: 2;">
                <label id="lblItem">Item</label>
                <input type="text" id="expLabel" placeholder="Ex: Telefone">
            </div>
            <div style="flex: 1;">
                <label id="lblAmount2">Valor (£)</label>
                <input type="number" id="expVal" step="0.01" placeholder="0.00">
            </div>
        </div>
        <button type="button" id="btnAddExpense" onclick="addExpense()" style="background-color: #555;">+ Adicionar Despesa</button>
        <div id="expenseList" style="margin-top: 8px;"></div>
    </div>

    <!-- RESUMO FINAL -->
    <div class="result-box">
        <h3 id="txtSummaryTitle">Resumo para o Universal Credit</h3>
        <div class="result-row">
            <span id="lblTrainActivated">Dias de Trem Ativados:</span>
            <span id="resDays" style="font-weight: 700;">0 dias (£0.00)</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 8px 0;">
        <div class="result-row highlight">
            <span id="lblTotalReceipts">Total Receipts (Ganhos):</span>
            <span id="resReceipts">£0.00</span>
        </div>
        <div class="result-row highlight">
            <span id="lblTotalExpenses">Total Expenses (Despesas):</span>
            <span id="resExpenses">£0.00</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 8px 0;">
        <div class="result-row" style="font-weight: 800; font-size: 19px; color: #000;">
            <span id="lblNetProfit">Lucro Líquido Real:</span>
            <span id="resNet">£0.00</span>
        </div>
    </div>

    <!-- BOTÕES DE AÇÃO -->
    <div class="action-area">
        <button class="btn-save" onclick="saveToSupabase()" id="btnSaveData">💾 Salvar no Banco de Dados</button>
        <button class="btn-email" onclick="sendEmail()" id="btnSendEmail">📧 Enviar por E-mail</button>
        <div class="row">
            <button class="btn-whatsapp" onclick="sendWhatsApp()" id="btnSendWhatsapp">Enviar WhatsApp</button>
            <button class="btn-print" onclick="window.print()" id="btnPrint">Imprimir / PDF</button>
        </div>
    </div>

    <!-- SEÇÃO DE HISTÓRICO VISÍVEL -->
    <div class="history-box">
        <h3 id="txtHistoryTitle">Histórico de Meses Anteriores</h3>
        <div id="historyList">...</div>
    </div>
</div>

<script>
    // --- COLE OS SEUS ENDEREÇOS REAIS DO SUPABASE AQUI ---
    const SUPABASE_URL = 'https://vpumxmewnmnoabhyprwu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fgDbSglGiTqbeVIj5kLVkA_YK98XfAz';

    let currentLang = 'PT';
    let incomes = [];
    let expenses = [];
    
    const todayYear = 2026;
    const todayMonth = 4; 
    const todayDay = 14;

    const i18n = {
        PT: {
            langLabel: "Português 🇧🇷", transportTitle: "Transporte (ida e volta)",
            transportSub: "Selecione as datas em que pegou trem (£6.00 ida/volta):",
            incomeTitle: "Ganhos Recebidos no Período", source: "Origem", amount: "Valor (£)", addIncome: "+ Adicionar Ganho",
            expenseTitle: "Outras Despesas (Telefone, etc)", item: "Item", addExpense: "+ Adicionar Despesa",
            summaryTitle: "Resumo para o Universal Credit", trainActivated: "Dias de Trem Ativados:",
            totalReceipts: "Total Receipts (Ganhos):", totalExpenses: "Total Expenses (Despesas):",
            netProfit: "Lucro Líquido Real:", btnWhatsapp: "Enviar WhatsApp", btnPrint: "Imprimir / PDF",
            defaultPhone: "Telefone / Internet Profissional", placeholderIncomeLabel: "Ex: Semana 15",
            placeholderExpLabel: "Ex: Telefone", daysText: "dias", month1: "Abr", month2: "Mai",
            btnSave: "💾 Salvar no Banco de Dados", saveSuccess: "Dados salvos com sucesso no Supabase!", saveError: "Erro ao salvar os dados.",
            btnEmail: "📧 Enviar por E-mail", emailSubject: "Relatório Universal Credit",
            historyTitle: "Histórico de Meses Anteriores", historyEmpty: "Nenhum histórico encontrado."
        },
        EN: {
            langLabel: "English 🇬🇧", transportTitle: "Transport (Return)",
            transportSub: "Select the dates you took the train (£6.00 return):",
            incomeTitle: "Income Received in the Period", source: "Source", amount: "Amount (£)", addIncome: "+ Add Income",
            expenseTitle: "Other Expenses (Phone, etc)", item: "Item", addExpense: "+ Add Expense",
            summaryTitle: "Summary for Universal Credit", trainActivated: "Train Days Activated:",
            totalReceipts: "Total Receipts (Income):", totalExpenses: "Total Expenses:",
            netProfit: "Estimated Net Profit:", btnWhatsapp: "Send WhatsApp", btnPrint: "Print / PDF",
            defaultPhone: "Business Phone / Internet", placeholderIncomeLabel: "Ex: Week 15",
            placeholderExpLabel: "Ex: Phone Bill", daysText: "days", month1: "Apr", month2: "May",
            btnSave: "💾 Save to Database", saveSuccess: "Data successfully saved to Supabase!", saveError: "Error saving data.",
            btnEmail: "📧 Send via Email", emailSubject: "Universal Credit Report",
            historyTitle: "History of Previous Months", historyEmpty: "No history found."
        }
    };

    function initApp() {
        // Carrega dados salvos semanalmente da memória do celular
        const savedIncomes = localStorage.getItem('uc_weekly_incomes');
        const savedExpenses = localStorage.getItem('uc_weekly_expenses');
        
        if (savedIncomes) incomes = JSON.parse(savedIncomes);
        if (savedExpenses) expenses = JSON.parse(savedExpenses);
        else expenses = [{ label: i18n[currentLang].defaultPhone, val: 7.00 }];

        generateCalendarGrid();
        renderExpenses();
        renderIncomes();
        
        // Carrega o histórico de forma protegida contra falhas de chaves
        if (!SUPABASE_URL.includes('co')) {
            document.getElementById('historyList').innerText = "Configure as chaves do Supabase.";
        } else {
            loadHistoryFromSupabase();
        }
    }

    function generateCalendarGrid() {
        const grid = document.getElementById('unifiedDaysGrid');
        
        // Recupera quais botões do trem estavam ativos no rascunho semanal
        const savedActiveIds = localStorage.getItem('uc_weekly_active_days');
        let activeIds = [];
        if (savedActiveIds) activeIds = JSON.parse(savedActiveIds);
        else activeIds = Array.from(document.querySelectorAll('.day-btn.active')).map(el => el.id);

        grid.innerHTML = '';
        
        for (let d = 15; d <= 30; d++) { 
            grid.appendChild(createDayButton(d, i18n[currentLang].month1, `m1-${d}`, activeIds, true)); 
        }
        for (let d = 1; d <= 14; d++) { 
            const isPast = d < todayDay;
            grid.appendChild(createDayButton(d, i18n[currentLang].month2, `m2-${d}`, activeIds, isPast)); 
        }
        calculate();
    }

    function createDayButton(day, monthName, id, activeIds, isPast) {
        const btn = document.createElement('div');
        btn.className = 'day-btn';
        btn.id = id;
        btn.innerHTML = `<span class="num">${day}</span><span class="month">${monthName}</span><span class="tag">Day Off</span>`;
        
        if (isPast) { btn.classList.add('past-off'); }
        if (activeIds.includes(id)) { btn.classList.add('active'); }
        
        btn.onclick = () => { 
            btn.classList.toggle('active'); 
            saveDraftToLocalStorage(); // Salva o clique do trem na mesma hora
            calculate(); 
        };
        return btn;
    }

    function saveDraftToLocalStorage() {
        // Salva os rascunhos em tempo real para não perder os dados semanais
        const activeIds = Array.from(document.querySelectorAll('.day-btn.active')).map(el => el.id);
        localStorage.setItem('uc_weekly_active_days', JSON.stringify(activeIds));
        localStorage.setItem('uc_weekly_incomes', JSON.stringify(incomes));
        localStorage.setItem('uc_weekly_expenses', JSON.stringify(expenses));
    }

    function toggleLanguage() {
        currentLang = currentLang === 'PT' ? 'EN' : 'PT';
        document.getElementById('langLabel').innerText = i18n[currentLang].langLabel;
        document.getElementById('txtTransportTitle').innerText = i18n[currentLang].transportTitle;
        document.getElementById('txtTransportSub').innerText = i18n[currentLang].transportSub;
        document.getElementById('txtIncomeTitle').innerText = i18n[currentLang].incomeTitle;
        document.getElementById('lblSource').innerText = i18n[currentLang].source;
        document.getElementById('lblAmount1').innerText = i18n[currentLang].amount;
        document.getElementById('btnAddIncome').innerText = i18n[currentLang].addIncome;
        document.getElementById('txtExpenseTitle').innerText = i18n[currentLang].expenseTitle;
        document.getElementById('lblItem').innerText = i18n[currentLang].item;
        document.getElementById('lblAmount2').innerText = i18n[currentLang].amount;
        document.getElementById('btnAddExpense').innerText = i18n[currentLang].addExpense;
        document.getElementById('txtSummaryTitle').innerText = i18n[currentLang].summaryTitle;
        document.getElementById('lblTrainActivated').innerText = i18n[currentLang].trainActivated;
        document.getElementById('lblTotalReceipts').innerText = i18n[currentLang].totalReceipts;
        document.getElementById('lblTotalExpenses').innerText = i18n[currentLang].totalExpenses;
        document.getElementById('lblNetProfit').innerText = i18n[currentLang].netProfit;
        document.getElementById('btnSendWhatsapp').innerText = i18n[currentLang].btnWhatsapp;
        document.getElementById('btnPrint').innerText = i18n[currentLang].btnPrint;
        document.getElementById('btnSaveData').innerText = i18n[currentLang].btnSave;
        document.getElementById('btnSendEmail').innerText = i18n[currentLang].btnEmail;
        document.getElementById('txtHistoryTitle').innerText = i18n[currentLang].historyTitle;
        document.getElementById('incomeLabel').placeholder = i18n[currentLang].placeholderIncomeLabel;
        document.getElementById('expLabel').placeholder = i18n[currentLang].placeholderExpLabel;

        if (expenses.length > 0 && (expenses[0].label === i18n.PT.defaultPhone || expenses[0].label === i18n.EN.defaultPhone)) {
            expenses[0].label = i18n[currentLang].defaultPhone;
        }
        generateCalendarGrid();
        renderExpenses();
        renderIncomes();
        if (SUPABASE_URL.includes('co')) loadHistoryFromSupabase();
    }

    function addIncome() {
        const label = document.getElementById('incomeLabel').value.trim() || (currentLang === 'PT' ? "Ganho" : "Income");
        const val = parseFloat(document.getElementById('incomeVal').value);
        if (isNaN(val) || val <= 0) return alert(currentLang === 'PT' ? "Valor inválido" : "Invalid value");
        incomes.push({ label, val });
        document.getElementById('incomeLabel').value = '';
        document.getElementById('incomeVal').value = '';
        renderIncomes();
        saveDraftToLocalStorage();
        calculate();
    }

    function removeIncome(index) { incomes.splice(index, 1); renderIncomes(); saveDraftToLocalStorage(); calculate(); }

    function renderIncomes() {
        const list = document.getElementById('incomeList');
        list.innerHTML = '';
        incomes.forEach((inc, i) => {
            list.innerHTML += `<div class="list-item"><span>💰 ${inc.label}: <b>£${inc.val.toFixed(2)}</b></span><span class="remove-btn" onclick="removeIncome(${i})">×</span></div>`;
        });
    }

    function addExpense() {
        const label = document.getElementById('expLabel').value.trim();
        const val = parseFloat(document.getElementById('expVal').value);
        if (!label || isNaN(val) || val <= 0) return alert(currentLang === 'PT' ? "Preencha os campos" : "Invalid fields");
        expenses.push({ label, val });
        document.getElementById('expLabel').value = '';
        document.getElementById('expVal').value = '';
        renderExpenses();
        saveDraftToLocalStorage();
        calculate();
    }

    function removeExpense(index) { expenses.splice(index, 1); renderExpenses(); saveDraftToLocalStorage(); calculate(); }

    function renderExpenses() {
        const list = document.getElementById('expenseList');
        list.innerHTML = '';
        expenses.forEach((exp, i) => {
            list.innerHTML += `<div class="list-item"><span>💼 ${exp.label}: <b>£${exp.val.toFixed(2)}</b></span><span class="remove-btn" onclick="removeExpense(${i})">×</span></div>`;
        });
    }

    function calculate() {
        const activeBoxes = document.querySelectorAll('.day-btn.active').length;
        const trainCost = activeBoxes * 6.00;
        document.getElementById('resDays').innerText = `${activeBoxes} ${i18n[currentLang].daysText} (£${trainCost.toFixed(2)})`;
        const totalReceipts = incomes.reduce((sum, inc) => sum + inc.val, 0);
        const totalExpenses = trainCost + expenses.reduce((sum, exp) => sum + exp.val, 0);
        const netProfit = totalReceipts - totalExpenses;
        document.getElementById('resReceipts').innerText = `£${totalReceipts.toFixed(2)}`;
        document.getElementById('resExpenses').innerText = `£${totalExpenses.toFixed(2)}`;
        document.getElementById('resNet').innerText = `£${netProfit.toFixed(2)}`;
    }

    async function saveToSupabase() {
        const activeBoxes = document.querySelectorAll('.day-btn.active').length;
        const trainCost = activeBoxes * 6.00;
        const totalReceipts = incomes.reduce((sum, inc) => sum + inc.val, 0);
        const totalExpenses = trainCost + expenses.reduce((sum, exp) => sum + exp.val, 0);
        const netProfit = totalReceipts - totalExpenses;

        const payload = {
            language: currentLang,
            train_days: activeBoxes,
            train_cost: trainCost,
            total_receipts: totalReceipts,
            total_expenses: totalExpenses,
            net_profit: netProfit,
            income_details: incomes,
            expense_details: expenses
        };

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/uc_reports`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) { 
                alert(i18n[currentLang].saveSuccess);
                // Limpa o rascunho semanal após o envio final do mês completo
                localStorage.removeItem('uc_weekly_active_days');
                localStorage.removeItem('uc_weekly_incomes');
                localStorage.removeItem('uc_weekly_expenses');
                incomes = [];
                expenses = [{ label: i18n[currentLang].defaultPhone, val: 7.00 }];
                
                generateCalendarGrid();
                renderExpenses();
                renderIncomes();
                loadHistoryFromSupabase(); 
            } 
            else {
                const errData = await response.json();
                alert(i18n[currentLang].saveError + " " + (errData.message || response.statusText));
            }
        } catch (err) { alert(i18n[currentLang].saveError + " " + err.message); }
    }

    async function loadHistoryFromSupabase() {
        const container = document.getElementById('historyList');
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/uc_reports?order=created_at.desc`, {
                method: 'GET',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });

            if (response.ok) {
                const data = await response.json();
                if(data.length === 0) {
                    container.innerText = i18n[currentLang].historyEmpty;
                    return;
                }
                container.innerHTML = '';
                data.forEach(item => {
                    const dateObj = new Date(item.created_at);
                    const formattedDate = dateObj.toLocaleDateString(currentLang === 'PT' ? 'pt-BR' : 'en-GB');
                    container.innerHTML += `
                        <div class="history-item">
                            <span class="history-date">📅 ${formattedDate}</span>
                            <span>🚂 ${item.train_days}d</span>
                            <span class="history-profit">Profit: £${Number(item.net_profit).toFixed(2)}</span>
                        </div>
                    `;
                });
            } else { container.innerText = "History loading hidden."; }
        } catch (err) { container.innerText = "Database offline."; }
    }
